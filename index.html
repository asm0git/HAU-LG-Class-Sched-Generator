<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Class Schedule Generator</title>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg:           #f0f0f0;
      --surface:      #ffffff;
      --surface2:     #f7f7f7;
      --border:       #d0d0d0;
      --border-light: #e0e0e0;
      --accent:       #555555;
      --accent-hover: #333333;
      --danger:       #cc3333;
      --text:         #1a1a1a;
      --text-muted:   #555555;
      --text-dim:     #999999;
      --input-bg:     #ffffff;
      --input-border: #c0c0c0;
      --input-focus:  #888888;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      color-scheme: light;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); min-height:100vh; }
    main { max-width:1360px; margin:0 auto; padding:1.25rem 1rem 3rem; }
    h1,h2,h3,p { margin:0; }

    /* HEADER */
    header {
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      padding:1rem 1.25rem; margin-bottom:1rem;
      display:flex; flex-wrap:wrap; align-items:center; gap:1rem;
    }
    .header-text { flex:1 1 260px; }
    header h1 { font-size:1.2rem; font-weight:700; }
    header p  { font-size:0.8rem; color:var(--text-muted); margin-top:0.15rem; }
    .header-group-field { display:flex; flex-direction:column; gap:0.25rem; flex:0 0 220px; }
    .header-group-field > span {
      font-size:0.72rem; font-weight:600; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:0.05em;
    }
    #learner-group {
      background:var(--input-bg); border:1px solid var(--input-border); border-radius:7px;
      padding:0.45rem 0.65rem; font:inherit; font-size:0.88rem; color:var(--text);
      transition:border-color 0.15s;
    }
    #learner-group:focus { outline:none; border-color:var(--input-focus); }

    /* CONTROLS */
    .controls { display:flex; gap:0.6rem; margin-bottom:1rem; flex-wrap:wrap; align-items:center; }
    button {
      border:1px solid var(--accent); border-radius:7px; padding:0.45rem 0.9rem;
      background:var(--accent); color:#fff; cursor:pointer; font:inherit;
      font-size:0.85rem; font-weight:600; transition:background 0.15s;
    }
    button:hover  { background:var(--accent-hover); border-color:var(--accent-hover); }
    button:active { opacity:0.85; }
    button.remove-member, button.remove-class {
      background:transparent; border:1px solid var(--danger); color:var(--danger);
      font-size:0.78rem; padding:0.3rem 0.6rem;
    }
    button.remove-member:hover, button.remove-class:hover { background:var(--danger); color:#fff; }
    button.duplicate-member, button.duplicate-class {
      background:transparent; border:1px solid var(--border);
      color:var(--text-muted); font-size:0.78rem; padding:0.3rem 0.6rem;
    }
    button.duplicate-member:hover, button.duplicate-class:hover {
      border-color:var(--accent); color:var(--accent); background:transparent;
    }
    .collapse-toggle {
      background:transparent; border:none; color:var(--text-muted);
      cursor:pointer; padding:0.3rem; margin-left:auto;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; border-radius:6px;
      transition:transform 0.15s, background 0.15s;
    }
    .collapse-toggle:hover { background:var(--surface2); border:none; }
    .collapse-toggle svg { width:18px; height:18px; transition:transform 0.15s; }
    .member-card.collapsed .collapse-toggle svg { transform:rotate(-90deg); }
    .member-card.collapsed .member-header { margin-bottom:0; }
    .member-card.collapsed .classes,
    .member-card.collapsed .add-class-btn { display:none; }
    button.add-class-btn {
      background:transparent; border:1px dashed var(--border);
      color:var(--text-muted); font-size:0.8rem; font-weight:500;
    }
    button.add-class-btn:hover { border-color:var(--accent); color:var(--accent); background:transparent; }

    .has-tip { position:relative; }
    .has-tip::after {
      content: attr(data-tip);
      position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
      background:#222; color:#fff; font-size:0.7rem; font-weight:400;
      padding:0.3rem 0.55rem; border-radius:5px; white-space:nowrap;
      pointer-events:none; opacity:0; transition:opacity 0.15s; z-index:100; line-height:1.4;
    }
    .has-tip::before {
      content:''; position:absolute; bottom:calc(100% + 1px); left:50%; transform:translateX(-50%);
      border:4px solid transparent; border-top-color:#222;
      pointer-events:none; opacity:0; transition:opacity 0.15s; z-index:100;
    }
    .has-tip:hover::after, .has-tip:hover::before { opacity:1; }

    .dl-group { display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
    .dl-group select {
      background:var(--input-bg); border:1px solid var(--input-border); border-radius:7px;
      padding:0.42rem 0.6rem; font:inherit; font-size:0.85rem; color:var(--text);
      cursor:pointer; transition:border-color 0.15s;
    }
    .dl-group select:focus { outline:none; border-color:var(--input-focus); }

    .section-title {
      font-size:0.72rem; font-weight:700; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:0.08em;
      margin-bottom:0.65rem; padding-bottom:0.4rem; border-bottom:1px solid var(--border);
    }

    #members { display:grid; gap:0.75rem; }
    .member-card {
      background:var(--surface); border-radius:10px;
      padding:0.9rem 1.1rem; border:1px solid var(--border);
    }
    .member-header { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.7rem; flex-wrap:wrap; }
    .member-name-input {
      background:transparent; border:none; border-bottom:1px dashed var(--border);
      color:var(--text); font:inherit; font-size:0.97rem; font-weight:700;
      padding:0.1rem 0.25rem; flex:1 1 160px; min-width:120px; max-width:240px;
      transition:border-color 0.15s;
    }
    .member-name-input:focus { outline:none; border-bottom-color:var(--input-focus); }
    .member-name-input::placeholder { color:var(--text-dim); font-weight:400; }
    .dept-input {
      background:var(--input-bg); border:1px solid var(--input-border); border-radius:6px;
      padding:0.3rem 0.5rem; font:inherit; font-size:0.82rem; color:var(--text);
      width:90px; flex-shrink:0; transition:border-color 0.15s;
    }
    .dept-input:focus { outline:none; border-color:var(--input-focus); }
    .dept-input::placeholder { color:var(--text-dim); }
    .position-input {
      background:var(--input-bg); border:1px solid var(--input-border); border-radius:6px;
      padding:0.3rem 0.5rem; font:inherit; font-size:0.82rem; font-style:italic;
      color:var(--text-muted); flex:1 1 120px; min-width:100px; max-width:180px;
      transition:border-color 0.15s;
    }
    .position-input:focus { outline:none; border-color:var(--input-focus); }
    .position-input::placeholder { color:var(--text-dim); }

    /* COLOR SWATCH */
    .color-swatch { display:flex; align-items:center; gap:0.3rem; flex-shrink:0; }
    input[type="color"] {
      width:28px; height:28px; padding:0; border:1px solid var(--border);
      border-radius:5px; cursor:pointer; background:none; overflow:hidden; flex-shrink:0;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding:0; margin:0; border:none; }
    input[type="color"]::-webkit-color-swatch { border:none; border-radius:4px; }
    input[type="color"]::-moz-color-swatch { border:none; border-radius:4px; }
    .member-color-hex {
      width:72px; font-size:0.78rem; font-family:monospace;
      padding:0.25rem 0.35rem; border:1px solid var(--input-border);
      border-radius:6px; background:var(--input-bg); color:var(--text);
      text-transform:uppercase; transition:border-color 0.15s; flex-shrink:0;
    }
    .member-color-hex:focus { outline:none; border-color:var(--input-focus); }
    .member-color-hex.hex-invalid { border-color: var(--danger); }

    label {
      display:flex; flex-direction:column; gap:0.25rem;
      font-size:0.72rem; font-weight:600; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:0.05em;
    }
    input:not(.member-name-input):not(.dept-input):not(.position-input):not(.member-color):not(.member-color-hex), select {
      background:var(--input-bg); border:1px solid var(--input-border); border-radius:6px;
      padding:0.4rem 0.55rem; font:inherit; font-size:0.85rem; font-weight:400;
      color:var(--text); transition:border-color 0.15s; text-transform:none; letter-spacing:normal;
    }
    input:not(.member-name-input):not(.dept-input):not(.position-input):not(.member-color):not(.member-color-hex):focus, select:focus {
      outline:none; border-color:var(--input-focus);
    }

    .classes { display:grid; gap:0.4rem; margin-bottom:0.5rem; }
    .class-entry-wrap { display:flex; flex-direction:column; gap:0; }
    .class-entry {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:0.45rem; align-items:end;
      background:var(--surface2); border:1px solid var(--border-light);
      border-radius:7px; padding:0.55rem 0.65rem;
    }
    .class-entry > label > input,
    .class-entry > label > select,
    .class-entry > div > button { height:2.1rem; box-sizing:border-box; }
    .class-entry > div { display:flex; gap:0.35rem; align-items:stretch; }
    .class-entry > div > button {
      flex:1; display:flex; align-items:center; justify-content:center;
      padding:0 0.6rem; margin:0;
    }
    .class-entry-wrap .class-error {
      color:#cc3333; font-size:0.7rem; padding:0.2rem 0.65rem 0.25rem;
      background:var(--surface2); border:1px solid var(--border-light);
      border-top:none; border-radius:0 0 7px 7px; margin:0;
    }

    .preview-controls { display:flex; align-items:center; gap:0.65rem; margin-bottom:0.65rem; flex-wrap:wrap; }
    .preview-controls label { flex-direction:row; align-items:center; gap:0.4rem; font-size:0.78rem; text-transform:uppercase; }
    .preview-controls select { width:auto; }
    #timeline-preview {
      background:var(--surface); border:1px solid var(--border);
      border-radius:8px; overflow:auto; max-height:72vh;
    }
    .preview-grid { width:100%; }
    .preview-header, .preview-row { display:grid; grid-template-columns:180px 1fr; }
    .preview-row { height:38px; }
    .preview-name {
      border-right:1px solid var(--border); border-bottom:1px solid var(--border-light);
      padding:0.3rem 0.5rem; font-size:0.7rem; color:var(--text);
      display:flex; flex-direction:column; justify-content:center;
      overflow:hidden; height:100%;
    }
    .preview-name span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .preview-time {
      position:relative; border-bottom:1px solid var(--border-light); height:100%;
      background-image:repeating-linear-gradient(
        to right, transparent, transparent calc((100% / 56) - 1px),
        #e0e0e0 calc((100% / 56) - 1px), #e0e0e0 calc(100% / 56)
      );
    }
    .preview-time.header-time { height:20px; border-bottom:1px solid var(--border); }
    .preview-slot-label { position:absolute; top:3px; transform:translateX(-50%); font-size:0.58rem; color:var(--text-dim); white-space:nowrap; }
    .preview-block {
      position:absolute; top:4px; height:calc(100% - 8px); min-height:22px;
      border-radius:4px; font-size:0.55rem; font-weight:600;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      padding:2px 4px; box-sizing:border-box; display:flex; align-items:center;
    }
    .preview-empty { padding:2rem; text-align:center; color:var(--text-dim); font-size:0.85rem; }

    footer {
      margin-top: 2.5rem; padding: 1rem 1.25rem;
      border-top: 1px solid var(--border); text-align: center;
      font-size: 0.75rem; color: var(--text-dim);
    }
    footer a { color: var(--text-muted); text-decoration: none; font-weight: 600; }
    footer a:hover { color: var(--text); text-decoration: underline; }

    .logo-upload-label {
      display: flex; align-items: center;
      background: var(--input-bg); border: 1px solid var(--input-border);
      border-radius: 7px; padding: 0.42rem 0.65rem;
      font-size: 0.82rem; color: var(--text-muted);
      cursor: pointer; transition: border-color 0.15s;
      text-transform: none; letter-spacing: normal; font-weight: 400;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .logo-upload-label:hover { border-color: var(--input-focus); color: var(--text); }
  </style>
</head>
<body>
<main>

  <header>
    <div class="header-text">
      <h1>Group Class Schedule Generator</h1>
      <p>Enter the class schedules of your members/officers and export layouted PDFs.</p>
    </div>
    <div class="header-group-field">
      <span>Learner Group</span>
      <input id="learner-group" type="text" />
    </div>
    <div class="header-group-field">
      <span>Upload Learner Group Logo <span style="font-weight:400;text-transform:none;">(optional)</span></span>
      <label class="logo-upload-label" for="lg-logo-input">
        <span id="logo-upload-text">Choose image…</span>
        <input id="lg-logo-input" type="file" accept="image/*" style="display:none;" />
      </label>
    </div>
  </header>

  <div class="controls">
    <button id="add-member" type="button">+ Add Member</button>
    <div class="dl-group">
      <select id="dl-day-select">
        <option value="ALL">All 6 Days (one PDF)</option>
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
        <option value="Saturday">Saturday</option>
      </select>
      <button id="generate-pdfs" type="button">⬇ Download PDF</button>
      <button id="save-project" type="button" class="has-tip" data-tip="Save your schedule to a .txt file so you can reload it later.">💾 Save Schedule</button>
      <button id="load-project" type="button" class="has-tip" data-tip="Load a previously saved .txt schedule file to continue editing.">📂 Load Schedule</button>
      <input id="load-project-file" type="file" accept=".txt,.json" style="display:none;">
    </div>
  </div>

  <div class="section-title">Members</div>
  <div id="members"></div>

  <div class="section-title" style="margin-top:1.25rem;">Preview</div>
  <div class="preview-controls">
    <label for="preview-day">Day <select id="preview-day"></select></label>
  </div>
  <div id="timeline-preview"></div>

</main>

<template id="member-template">
  <article class="member-card">
    <div class="member-header">
      <input class="member-name-input" type="text" placeholder="Member Name" />
      <input class="dept-input" type="text" placeholder="Dept" />
      <input class="position-input" type="text" placeholder="Position (optional)" />
      <div class="color-swatch">
        <input class="member-color" type="color" value="#888888" title="Bar color" />
        <input class="member-color-hex" type="text" value="#888888" maxlength="7" placeholder="#888888" spellcheck="false" />
      </div>
      <button class="duplicate-member" type="button">Duplicate member</button>
      <button class="remove-member" type="button">Remove member</button>
      <button class="collapse-toggle" type="button" title="Collapse/Expand" aria-label="Collapse member">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </button>
    </div>
    <div class="classes"></div>
    <button class="add-class-btn" type="button">+ Add Class</button>
  </article>
</template>

<template id="class-template">
  <div class="class-entry">
    <label>Day<select class="day"></select></label>
    <label>Course Code<input class="course-code" type="text" /></label>
    <label>Start<input class="start-time" type="time" min="06:00" max="21:30" step="900" /></label>
    <label>End<input class="end-time" type="time" min="06:15" max="21:30" step="900" /></label>
    <label>Room<input class="room" type="text" /></label>
    <label>Mode<select class="sync-mode">
      <option value="sync">Synchronous</option>
      <option value="async">Asynchronous</option>
    </select></label>
    <div style="display:flex;gap:.35rem;">
      <button class="duplicate-class" type="button">Duplicate</button>
      <button class="remove-class" type="button">Remove class</button>
    </div>
  </div>
</template>

<script>
  const DAYS        = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const VALID_START = 6 * 60;   // validation still starts at 6 AM
  const START_MIN   = 7 * 60;   // timeline/grid display starts at 7 AM
  const END_MIN     = 21 * 60 + 30;
  const TOTAL_SLOTS = (END_MIN - START_MIN) / 15;
  const MAX_ROWS_PER_PAGE = 20;  // changed from 30
  const BAR_PAD_X = 2.5;
  const BAR_PAD_Y = 2;
  const MIN_BAR_FS = 4.5;
  const GAP_RATIO  = 0.25;

  const membersEl    = document.getElementById('members');
  const previewDayEl = document.getElementById('preview-day');
  const timelineEl   = document.getElementById('timeline-preview');
  const lgInput      = document.getElementById('learner-group');
  const dlDaySelect  = document.getElementById('dl-day-select');

  DAYS.forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = d;
    previewDayEl.append(o);
  });

  function fillDaySelect(sel) {
    sel.innerHTML = '';
    DAYS.forEach(d => {
      const o = document.createElement('option');
      o.value = d; o.textContent = d;
      sel.append(o);
    });
  }

  function parseTime(val) {
    if (!val || !val.includes(':')) return null;
    const [h, m] = val.split(':').map(Number);
    if (isNaN(h) || isNaN(m)) return null;
    return h * 60 + m;
  }

  function clamp(v) { return Math.min(END_MIN, Math.max(START_MIN, v)); }

  function fmt(minutes) {
    const h24 = Math.floor(minutes / 60);
    const ampm = h24 >= 12 ? 'PM' : 'AM';
    const h12  = h24 % 12 || 12;
    return `${h12} ${ampm}`;
  }

  function fmtFull(minutes) {
    const h24  = Math.floor(minutes / 60);
    const mins = minutes % 60;
    const ampm = h24 >= 12 ? 'PM' : 'AM';
    const h12  = h24 % 12 || 12;
    return `${h12}:${String(mins).padStart(2,'0')} ${ampm}`;
  }

  function barLabel(e) { return `${e.courseCode} (${e.room})`; }

  // ── VALIDATION ───────────────────────────────────────────────────────────────
  function validateAndMarkEntries() {
    let hasErrors = false;
    membersEl.querySelectorAll('.member-card').forEach(card => {
      const fullName = card.querySelector('.member-name-input').value.trim();
      if (!fullName) return;
      const byDay = {};
      DAYS.forEach(d => byDay[d] = []);
      card.querySelectorAll('.class-entry').forEach(entry => {
        const startEl  = entry.querySelector('.start-time');
        const endEl    = entry.querySelector('.end-time');
        const day      = entry.querySelector('.day').value;
        const rawStart = parseTime(startEl.value);
        const rawEnd   = parseTime(endEl.value);
        startEl.style.borderColor = '';
        endEl.style.borderColor   = '';
        const wrap = entry.closest('.class-entry-wrap') || entry;
        wrap.querySelector('.class-error')?.remove();
        let err = null;
        // Validation still uses VALID_START (6 AM)
        if (rawStart === null || rawEnd === null) {
          err = 'Missing time.';
        } else if (rawStart < VALID_START || rawStart > END_MIN) {
          err = `Start must be between 6:00 AM and 9:30 PM.`;
          startEl.style.borderColor = '#cc3333';
        } else if (rawEnd < VALID_START || rawEnd > END_MIN) {
          err = `End must be between 6:00 AM and 9:30 PM.`;
          endEl.style.borderColor = '#cc3333';
        } else if (rawEnd <= rawStart) {
          err = `End time must be after start time.`;
          startEl.style.borderColor = '#cc3333';
          endEl.style.borderColor   = '#cc3333';
        } else {
          for (const prev of byDay[day]) {
            if (rawStart < prev.end && rawEnd > prev.start) {
              err = `Overlaps with ${prev.courseCode} (${fmtFull(prev.start)}–${fmtFull(prev.end)}).`;
              startEl.style.borderColor = '#e07b00';
              endEl.style.borderColor   = '#e07b00';
              break;
            }
          }
        }
        if (err) {
          hasErrors = true;
          const errEl = document.createElement('div');
          errEl.className = 'class-error';
          errEl.textContent = '⚠ ' + err;
          wrap.append(errEl);
        } else if (rawStart !== null && rawEnd !== null) {
          const courseCode = entry.querySelector('.course-code').value.trim() || '—';
          byDay[day].push({ start: rawStart, end: rawEnd, courseCode });
        }
      });
    });
    return hasErrors;
  }

  // ── DATA ─────────────────────────────────────────────────────────────────────
  function getData() {
    const members = [];
    membersEl.querySelectorAll('.member-card').forEach(card => {
      const fullName = card.querySelector('.member-name-input').value.trim();
      if (!fullName) return;
      const dept     = card.querySelector('.dept-input').value.trim();
      const position = card.querySelector('.position-input').value.trim();
      const color    = card.querySelector('.member-color').value || '#888888';
      const classes  = [];
      card.querySelectorAll('.class-entry').forEach(entry => {
        const day        = entry.querySelector('.day').value;
        const courseCode = entry.querySelector('.course-code').value.trim();
        const room       = entry.querySelector('.room').value.trim();
        const rawStart   = parseTime(entry.querySelector('.start-time').value);
        const rawEnd     = parseTime(entry.querySelector('.end-time').value);
        const syncMode   = entry.querySelector('.sync-mode').value;
        if (rawStart === null || rawEnd === null) return;
        if (rawStart < VALID_START || rawEnd > END_MIN) return;
        if (rawEnd <= rawStart) return;
        classes.push({ day, courseCode: courseCode||'—', room: room||'—', start: rawStart, end: rawEnd, syncMode });
      });
      members.push({ fullName, dept, position, color, classes });
    });
    return members;
  }

  // ── PREVIEW ──────────────────────────────────────────────────────────────────
  function renderPreview() {
    validateAndMarkEntries();
    const day     = previewDayEl.value;
    const members = getData();
    if (!members.length) {
      timelineEl.innerHTML = '<div class="preview-empty">Add at least one member with a name to see the preview.</div>';
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'preview-grid';
    const hdr = document.createElement('div');
    hdr.className = 'preview-header';
    const hName = document.createElement('div');
    hName.className = 'preview-name';
    hName.style.cssText = 'font-weight:700;font-size:0.68rem;color:#999;';
    hName.textContent = 'Member';
    hdr.append(hName);
    const hTime = document.createElement('div');
    hTime.className = 'preview-time header-time';
    // Preview timeline: START_MIN = 7 AM
    for (let m = START_MIN; m <= END_MIN; m += 60) {
      const lbl = document.createElement('span');
      lbl.className = 'preview-slot-label';
      lbl.textContent = fmt(m);
      lbl.style.left = `${((m - START_MIN) / (END_MIN - START_MIN)) * 100}%`;
      hTime.append(lbl);
    }
    hdr.append(hTime);
    grid.append(hdr);
    members.forEach(member => {
      const row = document.createElement('div');
      row.className = 'preview-row';
      const nameCell = document.createElement('div');
      nameCell.className = 'preview-name';
      const nameSpan = document.createElement('span');
      nameSpan.style.cssText = 'font-weight:600;font-size:0.72rem;';
      nameSpan.textContent = member.fullName + (member.dept ? ` (${member.dept})` : '');
      nameCell.append(nameSpan);
      if (member.position) {
        const posSpan = document.createElement('span');
        posSpan.style.cssText = 'font-style:italic;font-size:0.63rem;color:#888;margin-top:1px;';
        posSpan.textContent = member.position;
        nameCell.append(posSpan);
      }
      const timeline = document.createElement('div');
      timeline.className = 'preview-time';
      member.classes.filter(c => c.day === day).forEach(entry => {
        // Clamp visually to display timeline (7 AM start)
        const dispStart = Math.max(entry.start, START_MIN);
        const dispEnd   = Math.min(entry.end, END_MIN);
        if (dispEnd <= dispStart) return; // fully before 7 AM, skip in preview
        const block = document.createElement('div');
        block.className = 'preview-block';
        const left  = ((dispStart - START_MIN) / (END_MIN - START_MIN)) * 100;
        const width = ((dispEnd - dispStart) / (END_MIN - START_MIN)) * 100;
        block.style.left  = `${left}%`;
        block.style.width = `${Math.max(width, 1.5)}%`;
        if (entry.syncMode === 'async') {
          block.style.background = member.color + '33';
          block.style.border     = `2px dashed ${member.color}`;
          block.style.color      = member.color;
        } else {
          block.style.background = member.color;
          block.style.border     = 'none';
          block.style.color      = '#fff';
        }
        block.title       = `${barLabel(entry)} | ${fmtFull(entry.start)}–${fmtFull(entry.end)}`;
        block.textContent = barLabel(entry);
        timeline.append(block);
      });
      row.append(nameCell, timeline);
      grid.append(row);
    });
    timelineEl.replaceChildren(grid);
  }

  // ── PDF HELPERS ───────────────────────────────────────────────────────────────
  function hexToRgb(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }

  let lgLogoDataUrl = null;
  let lgLogoMime    = 'JPEG';

  document.getElementById('lg-logo-input').addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    document.getElementById('logo-upload-text').textContent = file.name;
    const reader = new FileReader();
    reader.onload = e => {
      lgLogoDataUrl = e.target.result;
      lgLogoMime = file.type === 'image/png' ? 'PNG' : 'JPEG';
    };
    reader.readAsDataURL(file);
  });

  function drawDayPage(pdf, day, members, allMembers, learnerGroup, pageNum, totalPages, globalBarFs) {
    const PW = 841.89, PH = 595.28;
    const margin = 20;

    const headerH  = 18;
    const timeRowH = 26;

    const gridTopEst    = margin + headerH + timeRowH;
    const gridBottomEst = PH - margin;
    const rowsHEst      = gridBottomEst - gridTopEst;
    const rowCount      = Math.min(allMembers.length, MAX_ROWS_PER_PAGE) || 1;
    const rowH          = Math.max(14, rowsHEst / rowCount);

    const nameFontSz      = Math.min(14, Math.max(8,  rowH * 0.45));
    const posFontSz       = Math.min(10, Math.max(6,  rowH * 0.32));
    const timeLabelFontSz = 6;
    const headerFontSz    = 10;

    pdf.setFont('helvetica','bold');
    pdf.setFontSize(nameFontSz);
    let longestWidth = 0;
    allMembers.forEach(member => {
      const label = member.dept ? `${member.fullName} (${member.dept})` : member.fullName;
      longestWidth = Math.max(longestWidth, pdf.getTextWidth(label));
    });
    const nameColW  = Math.min(Math.max(longestWidth + 16, 80), 260);
    const timelineX = margin + nameColW;
    const timelineW = PW - margin - timelineX;
    const gridTop   = gridTopEst;

    pdf.setFillColor(255,255,255);
    pdf.rect(0, 0, PW, PH, 'F');

    const lineY = margin + headerH * 0.78;
    let curX = margin;
    const logoH = headerH - 2;
    if (lgLogoDataUrl) {
      try {
        pdf.addImage(lgLogoDataUrl, lgLogoMime, curX, margin + 1, logoH, logoH);
        curX += logoH + 5;
      } catch(e) { /* skip */ }
    }
    pdf.setFont('helvetica','bold');
    pdf.setFontSize(headerFontSz);
    pdf.setTextColor(20,20,20);
    pdf.text(learnerGroup || 'Class Schedule', curX, lineY);

    pdf.setFont('helvetica','bold');
    pdf.setFontSize(headerFontSz + 2);
    pdf.setTextColor(40,40,40);
    const dayW = pdf.getTextWidth(day);
    pdf.text(day, (PW - dayW) / 2, lineY);

    if (totalPages > 1) {
      pdf.setFont('helvetica','normal');
      pdf.setFontSize(headerFontSz - 2);
      pdf.setTextColor(140,140,140);
      const pageLabel = `Page ${pageNum}/${totalPages}`;
      const pgW = pdf.getTextWidth(pageLabel);
      pdf.text(pageLabel, PW - margin - pgW, lineY);
    }

    pdf.setDrawColor(200,200,200);
    pdf.setLineWidth(0.3);
    pdf.line(margin, margin + headerH, PW - margin, margin + headerH);

    const actualGridBottom = gridTop + members.length * rowH;

    const labBaseline = gridTop - 2;
    pdf.setFontSize(timeLabelFontSz);
    pdf.setTextColor(140,140,140);
    pdf.setDrawColor(210,210,210);
    // Grid lines & labels: START_MIN = 7 AM
    for (let i = 0; i <= TOTAL_SLOTS; i++) {
      const x = timelineX + (i / TOTAL_SLOTS) * timelineW;
      if      (i % 4 === 0) pdf.setLineWidth(0.5);
      else if (i % 2 === 0) pdf.setLineWidth(0.25);
      else                  pdf.setLineWidth(0.1);
      pdf.line(x, gridTop, x, actualGridBottom);
      if (i % 2 === 0) {
        const m = START_MIN + i * 15;
        const labelText = (m % 60 === 0) ? fmt(m) : `${Math.floor(m/60) % 12 || 12}:30`;
        pdf.saveGraphicsState();
        pdf.text(labelText, x, labBaseline, { angle: 90, align: 'left' });
        pdf.restoreGraphicsState();
      }
    }

    pdf.setDrawColor(180,180,180);
    pdf.setLineWidth(0.4);
    pdf.line(margin, gridTop, PW - margin, gridTop);

    members.forEach((member, idx) => {
      const y = gridTop + idx * rowH;

      pdf.setDrawColor(220,220,220);
      pdf.setLineWidth(0.2);
      pdf.line(margin, y + rowH, PW - margin, y + rowH);

      const hasPos    = !!member.position;
      const nameLabel = member.dept ? `${member.fullName} (${member.dept})` : member.fullName;
      pdf.setFont('helvetica','bold');
      pdf.setFontSize(nameFontSz);
      const nameLines  = pdf.splitTextToSize(nameLabel, nameColW - 4);
      const nameLineH  = nameFontSz * 1.15;
      const posLineH   = posFontSz  * 1.15;
      const gap        = 0.5;
      const nameBlockH = nameLines.length * nameLineH;
      const textBlockH = hasPos ? nameBlockH + gap + posLineH : nameBlockH;
      const scale      = textBlockH > rowH - 4 ? (rowH - 4) / textBlockH : 1;
      const drawNameSz = nameFontSz * scale;
      const drawPosSz  = posFontSz  * scale;
      const drawNameLH = nameLineH  * scale;
      const drawGap    = gap        * scale;
      const drawBlockH = textBlockH * scale;
      const textTopY   = y + (rowH - drawBlockH) / 2 + drawNameSz * 0.75;

      pdf.setTextColor(20,20,20);
      pdf.setFontSize(drawNameSz);

      let nameLineCount = 1;

      if (member.dept) {
        const nameOnly = member.fullName;
        const deptText = ` (${member.dept})`;
        pdf.setFont('helvetica','bold');
        const nameOnlyW = pdf.getTextWidth(nameOnly);
        pdf.setFont('helvetica','normal');
        const deptW = pdf.getTextWidth(deptText);

        if (nameOnlyW + deptW <= nameColW - 4) {
          pdf.setFont('helvetica','bold');
          pdf.text(nameOnly, margin + 2, textTopY);
          pdf.setFont('helvetica','normal');
          pdf.text(deptText, margin + 2 + nameOnlyW, textTopY);
          nameLineCount = 1;
        } else {
          pdf.setFont('helvetica','bold');
          const nameWrapped = pdf.splitTextToSize(nameOnly, nameColW - 4);
          nameWrapped.forEach((line, li) => pdf.text(line, margin + 2, textTopY + li * drawNameLH));
          pdf.setFont('helvetica','normal');
          pdf.setFontSize(drawNameSz * 0.9);
          pdf.text(deptText.trim(), margin + 2, textTopY + nameWrapped.length * drawNameLH);
          pdf.setFontSize(drawNameSz);
          nameLineCount = nameWrapped.length + 1;
        }
      } else {
        pdf.setFont('helvetica','bold');
        const nameLines2 = pdf.splitTextToSize(member.fullName, nameColW - 4);
        nameLines2.forEach((line, li) => pdf.text(line, margin + 2, textTopY + li * drawNameLH));
        nameLineCount = nameLines2.length;
      }

      if (hasPos) {
        pdf.setTextColor(110,110,110);
        pdf.setFont('helvetica','italic');
        pdf.setFontSize(drawPosSz);
        const posY = textTopY + nameLineCount * drawNameLH + drawGap;
        pdf.text(member.position, margin + 2, posY, { maxWidth: nameColW - 4 });
      }
    });

    const globalRoomFs = globalBarFs * 0.88;
    const globalTimeFs = globalBarFs * 0.80;

    members.forEach((member, idx) => {
      const y = gridTop + idx * rowH;
      member.classes.filter(e => e.day === day).forEach(entry => {
        // Clamp bar to display timeline (7 AM)
        const dispStart = Math.max(entry.start, START_MIN);
        const dispEnd   = Math.min(entry.end, END_MIN);
        if (dispEnd <= dispStart) return;

        const bx = timelineX + ((dispStart - START_MIN) / (END_MIN - START_MIN)) * timelineW;
        const bw = ((dispEnd - dispStart) / (END_MIN - START_MIN)) * timelineW;
        const bh = Math.max(rowH - 4, 4);
        const [r,g,b] = hexToRgb(member.color || '#888888');
        const isAsync = entry.syncMode === 'async';

        if (isAsync) {
          pdf.setFillColor(255, 255, 255);
          pdf.rect(bx, y + 2, Math.max(bw, 2), bh, 'F');
          pdf.setDrawColor(r, g, b);
          pdf.setLineWidth(0.75);
          pdf.setLineDashPattern([2, 1.5], 0);
          pdf.rect(bx, y + 2, Math.max(bw, 2), bh, 'S');
          pdf.setLineDashPattern([], 0);
        } else {
          pdf.setFillColor(r, g, b);
          pdf.rect(bx, y + 2, Math.max(bw, 2), bh, 'F');
        }

        const maxTextW = bw - BAR_PAD_X * 2;
        const maxTextH = bh - BAR_PAD_Y * 2;
        if (maxTextW < 5 || maxTextH < 6) return;

        const codePart = entry.courseCode;
        const roomPart = `(${entry.room})`;
        const timePart = `${fmtFull(entry.start)}–${fmtFull(entry.end)}`;

        // ── Per-bar font sizing: find the largest fs where everything fits ──
        // We try to fit: code (bold) + room (italic, 0.88x) + time (normal, 0.80x)
        // Graceful degradation: if even MIN_BAR_FS can't fit all 3, drop time,
        // then drop room, then just render code.
        let barFs = globalBarFs;

        // Helper: compute layout at a given fs. Returns null if doesn't fit.
        function tryLayout(fs, includeRoom, includeTime) {
          const rFs = fs * 0.88;
          const tFs = fs * 0.80;
          const gap = fs * GAP_RATIO;

          pdf.setFont('helvetica', 'bold');
          pdf.setFontSize(fs);
          const cl = splitWithHyphenation(pdf, codePart, maxTextW);
          const cH = cl.length * (fs * 1.1);

          let totalH = cH;
          if (includeRoom) {
            pdf.setFont('helvetica', 'italic');
            pdf.setFontSize(rFs);
            if (pdf.getTextWidth(roomPart) > maxTextW) return null;
            totalH += gap + rFs * 1.1;
          }
          if (includeTime) {
            pdf.setFont('helvetica', 'normal');
            pdf.setFontSize(tFs);
            if (pdf.getTextWidth(timePart) > maxTextW) return null;
            totalH += gap * 0.6 + tFs * 1.1;
          }
          if (totalH > maxTextH) return null;
          return { cl, cH, totalH };
        }

        // Find best fs for all 3 lines
        let layout = null;
        let includeRoom = true, includeTime = true;
        for (let fs = barFs; fs >= MIN_BAR_FS; fs -= 0.5) {
          layout = tryLayout(fs, true, true);
          if (layout) { barFs = fs; break; }
        }
        // If can't fit 3 lines, try code+room only
        if (!layout) {
          includeTime = false;
          for (let fs = globalBarFs; fs >= MIN_BAR_FS; fs -= 0.5) {
            layout = tryLayout(fs, true, false);
            if (layout) { barFs = fs; break; }
          }
        }
        // If still no fit, try code only
        if (!layout) {
          includeRoom = false;
          includeTime = false;
          for (let fs = globalBarFs; fs >= MIN_BAR_FS; fs -= 0.5) {
            layout = tryLayout(fs, false, false);
            if (layout) { barFs = fs; break; }
          }
        }
        // Last resort: code at MIN_BAR_FS, clipped
        if (!layout) {
          barFs = MIN_BAR_FS;
          pdf.setFont('helvetica', 'bold');
          pdf.setFontSize(barFs);
          layout = {
            cl: splitWithHyphenation(pdf, codePart, maxTextW),
            cH: MIN_BAR_FS * 1.1,
            totalH: MIN_BAR_FS * 1.1
          };
          includeRoom = false; includeTime = false;
        }

        const barRoomFs = barFs * 0.88;
        const barTimeFs = barFs * 0.80;
        const barGap    = barFs * GAP_RATIO;
        const { cl: codeLines, cH: codeBlockH, totalH } = layout;

        // Vertically center — clamp so text never starts above the bar top
        const barInnerTop = y + 2 + BAR_PAD_Y;
        const blockTopY   = Math.max(barInnerTop, y + 2 + (bh - totalH) / 2);

        // Draw course code (bold)
        pdf.setFont('helvetica', 'bold');
        pdf.setFontSize(barFs);
        if (isAsync) pdf.setTextColor(r, g, b);
        else         pdf.setTextColor(255, 255, 255);
        const codeStartY = blockTopY + barFs * 0.82;
        codeLines.forEach((line, li) => {
          pdf.text(line, bx + BAR_PAD_X, codeStartY + li * (barFs * 1.1));
        });

        // Draw room (italic)
        if (includeRoom) {
          const roomBaseY = blockTopY + codeBlockH + barGap + barRoomFs * 0.82;
          pdf.setFont('helvetica', 'italic');
          pdf.setFontSize(barRoomFs);
          if (isAsync) {
            pdf.setTextColor(Math.min(255, r + 40), Math.min(255, g + 40), Math.min(255, b + 40));
          } else {
            pdf.setTextColor(235, 235, 235);
          }
          pdf.text(roomPart, bx + BAR_PAD_X, roomBaseY);

          // Draw time range (normal)
          if (includeTime) {
            const timeBaseY = blockTopY + codeBlockH + barGap + barRoomFs * 1.1 + barGap * 0.6 + barTimeFs * 0.82;
            pdf.setFont('helvetica', 'normal');
            pdf.setFontSize(barTimeFs);
            if (isAsync) {
              pdf.setTextColor(Math.min(255, r + 60), Math.min(255, g + 60), Math.min(255, b + 60));
            } else {
              pdf.setTextColor(220, 220, 220);
            }
            pdf.text(timePart, bx + BAR_PAD_X, timeBaseY);
          }
        }
      });
    });

    // ── FREE-SLOT OVERLAY ────────────────────────────────────────────
    // Compute occupied minutes across ALL members (not just this page chunk)
    // so multi-page PDFs don't falsely show free slots for absent members.
    // Resolution: track per-minute occupancy for accurate partial-slot detection.
    const totalMins = END_MIN - START_MIN; // 875 minutes (7 AM – 9:30 PM)
    const occupiedMin = new Uint8Array(totalMins);
    allMembers.forEach(member => {
      member.classes.filter(e => e.day === day).forEach(entry => {
        const s = Math.max(0, entry.start - START_MIN);
        const e2 = Math.min(totalMins, entry.end - START_MIN);
        for (let m = s; m < e2; m++) occupiedMin[m] = 1;
      });
    });

    // Merge contiguous free runs (in minutes), discard runs <= 10 minutes
    const MIN_FREE_MINS = 10; // must be MORE than 10 min to show as free
    const freeRuns = [];
    let runStart = -1;
    for (let m = 0; m <= totalMins; m++) {
      const isFree = m < totalMins && !occupiedMin[m];
      if (isFree && runStart === -1) { runStart = m; }
      else if (!isFree && runStart !== -1) {
        if (m - runStart > MIN_FREE_MINS) freeRuns.push([runStart, m]);
        runStart = -1;
      }
    }

    // Draw free-slot overlays (behind row dividers, above bg)
    const gridH = actualGridBottom - gridTop;
    freeRuns.forEach(([sMin, eMin]) => {
      const fx = timelineX + (sMin / totalMins) * timelineW;
      const fw = ((eMin - sMin) / totalMins) * timelineW;

      // Light green fill spanning full grid height
      pdf.setFillColor(220, 245, 220);
      pdf.rect(fx, gridTop, fw, gridH, 'F');

      // Vertical centred label: "Free" on line 1, time range on line 2
      // Text is rotated 90° and centred vertically in the band.
      // Only draw if the band is wide enough to be legible at all.
      const startM  = START_MIN + sMin;
      const endM    = START_MIN + eMin;
      const line1   = 'Free';
      const line2   = `${fmtFull(startM)}–${fmtFull(endM)}`;

      // Pick a font size that fits within the band width when rotated
      // (rotated text height = text width; rotated text width = text height)
      // We want the combined "height" of both lines (which becomes width when rotated)
      // to fit within fw - 4pt padding.
      const MAX_LABEL_FS = 8;
      const MIN_LABEL_FS = 4;
      let labelFs = MAX_LABEL_FS;
      let line1W, line2W;
      for (; labelFs >= MIN_LABEL_FS; labelFs -= 0.5) {
        pdf.setFont('helvetica', 'bold');
        pdf.setFontSize(labelFs);
        line1W = pdf.getTextWidth(line1);
        pdf.setFont('helvetica', 'normal');
        pdf.setFontSize(labelFs * 0.88);
        line2W = pdf.getTextWidth(line2);
        // When rotated, "width" of text becomes the vertical space it needs.
        // Both lines sit side-by-side rotated; total rotated height = line1W + gap + line2W
        // But we need that <= fw - 4.
        const rotatedSpan = line1W + labelFs * 1.2 + line2W; // combined horizontal span after rotation
        if (rotatedSpan <= fw - 4) break;
      }
      if (labelFs < MIN_LABEL_FS) labelFs = MIN_LABEL_FS;

      // Re-measure at chosen size
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(labelFs);
      line1W = pdf.getTextWidth(line1);
      const line2Fs = labelFs * 0.88;
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(line2Fs);
      line2W = pdf.getTextWidth(line2);

      // Vertical centre of the grid band
      const bandCenterY = gridTop + gridH / 2;
      // Horizontal centre of the free band (= vertical anchor when rotated)
      const bandCenterX = fx + fw / 2;

      // Total height of both text lines when rendered horizontally
      // (= total width occupied when rotated 90°)
      const lineGap    = labelFs * 0.3;
      const totalSpan  = line1W + lineGap + line2W;

      // Draw line1 ("Free") rotated 90° counter-clockwise, centred in the band
      // jsPDF angle is counter-clockwise. anchor: baseline of text.
      // When rotated +90, text reads bottom-to-top.
      // Position: x = bandCenterX, y = bandCenterY + half of totalSpan
      const line1StartY = bandCenterY + totalSpan / 2;
      const line2StartY = line1StartY - line1W - lineGap;

      // Only draw if both lines fit vertically in the grid
      if (totalSpan <= gridH - 4 && fw >= 6) {
        pdf.setFont('helvetica', 'bold');
        pdf.setFontSize(labelFs);
        pdf.setTextColor(80, 160, 80);
        pdf.text(line1, bandCenterX, line1StartY, { angle: 90 });

        pdf.setFont('helvetica', 'normal');
        pdf.setFontSize(line2Fs);
        pdf.setTextColor(100, 170, 100);
        pdf.text(line2, bandCenterX, line2StartY, { angle: 90 });
      }
    });

    // Redraw row dividers on top of the free overlay so they stay crisp
    members.forEach((member, idx) => {
      const y = gridTop + idx * rowH;
      pdf.setDrawColor(220,220,220);
      pdf.setLineWidth(0.2);
      pdf.line(timelineX, y + rowH, PW - margin, y + rowH);
    });

    pdf.setDrawColor(180,180,180);
    pdf.setLineWidth(0.4);
    pdf.line(timelineX, margin + headerH, timelineX, actualGridBottom);
  }

  function addDayToPdf(pdf, day, allMembers, learnerGroup, isFirstPage, pageOffset, totalPages, globalBarFs) {
    const chunks = [];
    for (let i = 0; i < allMembers.length; i += MAX_ROWS_PER_PAGE) {
      chunks.push(allMembers.slice(i, i + MAX_ROWS_PER_PAGE));
    }
    if (chunks.length === 0) chunks.push([]);
    chunks.forEach((chunk, ci) => {
      if (!isFirstPage || ci > 0) pdf.addPage();
      isFirstPage = false;
      drawDayPage(pdf, day, chunk, allMembers, learnerGroup, pageOffset + ci + 1, totalPages, globalBarFs);
    });
  }

  function hyphenateToFit(pdf, word, maxW) {
    const lines = [];
    let remaining = word;
    while (remaining.length > 0) {
      let lo = 1, hi = remaining.length;
      while (lo < hi) {
        const mid = Math.ceil((lo + hi) / 2);
        const test = remaining.length > mid ? remaining.slice(0, mid) + '-' : remaining.slice(0, mid);
        if (pdf.getTextWidth(test) <= maxW) lo = mid;
        else hi = mid - 1;
      }
      if (lo === 0) lo = 1;
      const needsHyphen = lo < remaining.length;
      lines.push(remaining.slice(0, lo) + (needsHyphen ? '-' : ''));
      remaining = remaining.slice(lo);
    }
    return lines;
  }

  function splitWithHyphenation(pdf, text, maxW) {
    const words = text.split(/\s+/);
    const lines = [];
    let current = '';
    for (const word of words) {
      const test = current ? current + ' ' + word : word;
      if (pdf.getTextWidth(test) <= maxW) {
        current = test;
      } else {
        if (current) lines.push(current);
        if (pdf.getTextWidth(word) <= maxW) {
          current = word;
        } else {
          const parts = hyphenateToFit(pdf, word, maxW);
          for (let i = 0; i < parts.length - 1; i++) lines.push(parts[i]);
          current = parts[parts.length - 1];
        }
      }
    }
    if (current) lines.push(current);
    return lines;
  }

  function computeGlobalBarFs(pdf, members, daysToCheck) {
    const PW = 841.89, PH = 595.28;
    const margin = 20;
    const headerH  = 18;
    const timeRowH = 26;
    const gridTopEst    = margin + headerH + timeRowH;
    const gridBottomEst = PH - margin;
    const rowsHEst      = gridBottomEst - gridTopEst;
    const rowCount      = Math.min(members.length, MAX_ROWS_PER_PAGE) || 1;
    const rowH          = Math.max(14, rowsHEst / rowCount);
    const bh            = Math.max(rowH - 4, 4);

    const nameFontSz = Math.min(14, Math.max(8, rowH * 0.45));
    pdf.setFont('helvetica','bold');
    pdf.setFontSize(nameFontSz);
    let longestNameW = 0;
    members.forEach(m => {
      const label = m.dept ? `${m.fullName} (${m.dept})` : m.fullName;
      longestNameW = Math.max(longestNameW, pdf.getTextWidth(label));
    });
    const nameColW  = Math.min(Math.max(longestNameW + 16, 80), 260);
    const timelineX = margin + nameColW;
    const timelineW = PW - margin - timelineX;

    const MAX_FS = Math.min(14, Math.max(5, bh * 0.40));
    let globalFs = MAX_FS;

    members.forEach(member => {
      daysToCheck.forEach(day => {
        member.classes.filter(e => e.day === day).forEach(entry => {
          // Use display-clamped width
          const dispStart = Math.max(entry.start, START_MIN);
          const dispEnd   = Math.min(entry.end, END_MIN);
          if (dispEnd <= dispStart) return;
          const bw       = ((dispEnd - dispStart) / (END_MIN - START_MIN)) * timelineW;
          const maxTextW = bw - BAR_PAD_X * 2;
          const maxTextH = bh - BAR_PAD_Y * 2;
          if (maxTextW < 5 || maxTextH < 6) return;

          const codePart = entry.courseCode;
          const roomPart = `(${entry.room})`;
          const timePart = `${fmtFull(entry.start)}–${fmtFull(entry.end)}`;

          // Mirror per-bar degradation: code+room+time, then code+room, then code-only.
          let bestFs = MIN_BAR_FS;
          outerLoop: for (const [tryRoom, tryTime] of [[true,true],[true,false],[false,false]]) {
            for (let fs = globalFs; fs >= MIN_BAR_FS; fs -= 0.5) {
              const rFs = fs * 0.88;
              const tFs = fs * 0.80;
              const gap = fs * GAP_RATIO;
              pdf.setFont('helvetica', 'bold');
              pdf.setFontSize(fs);
              const cl = splitWithHyphenation(pdf, codePart, maxTextW);
              const cH = cl.length * (fs * 1.1);
              let totalH = cH;
              if (tryRoom) {
                pdf.setFont('helvetica','italic');
                pdf.setFontSize(rFs);
                if (pdf.getTextWidth(roomPart) > maxTextW) continue;
                totalH += gap + rFs * 1.1;
              }
              if (tryTime) {
                pdf.setFont('helvetica','normal');
                pdf.setFontSize(tFs);
                if (pdf.getTextWidth(timePart) > maxTextW) continue;
                totalH += gap * 0.6 + tFs * 1.1;
              }
              if (totalH <= maxTextH) { bestFs = fs; break outerLoop; }
            }
          }
          globalFs = Math.min(globalFs, bestFs);
        });
      });
    });

    return globalFs;
  }

  // ── GENERATE PDF(S) ───────────────────────────────────────────────────────────
  function generatePdfs() {
    const hasErrors = validateAndMarkEntries();
    if (hasErrors) {
      alert('Please fix the highlighted errors before generating PDFs.\n\nCheck for: invalid times (outside 6 AM–9:30 PM), end time before start time, or overlapping classes.');
      return;
    }
    const members = getData();
    const lg      = lgInput.value.trim();
    const dlDay   = dlDaySelect.value;
    if (!members.length) {
      alert('Add at least one member with a name before generating PDFs.');
      return;
    }
    const { jsPDF } = window.jspdf;
    function pagesForDay(n) { return Math.max(1, Math.ceil(n / MAX_ROWS_PER_PAGE)); }

    const _pdf = new jsPDF({ orientation:'landscape', unit:'pt', format:'a4' });
    const daysToCheck = dlDay === 'ALL' ? DAYS : [dlDay];
    const globalBarFs = computeGlobalBarFs(_pdf, members, daysToCheck);
    if (dlDay === 'ALL') {
      const totalPages = DAYS.reduce((sum, _) => sum + pagesForDay(members.length), 0);
      const pdf = new jsPDF({ orientation:'landscape', unit:'pt', format:'a4' });
      let pageOffset = 0;
      DAYS.forEach((day, di) => {
        addDayToPdf(pdf, day, members, lg, di === 0, pageOffset, totalPages, globalBarFs);
        pageOffset += pagesForDay(members.length);
      });
      const filename = lg ? `${lg.replace(/\s+/g,'-')}-all-days.pdf` : 'all-days-schedule.pdf';
      pdf.save(filename);
    } else {
      const totalPages = pagesForDay(members.length);
      const pdf = new jsPDF({ orientation:'landscape', unit:'pt', format:'a4' });
      addDayToPdf(pdf, dlDay, members, lg, true, 0, totalPages, globalBarFs);
      const filename = lg ? `${lg.replace(/\s+/g,'-')}-${dlDay.toLowerCase()}.pdf` : `${dlDay.toLowerCase()}-schedule.pdf`;
      pdf.save(filename);
    }
  }

  // ── DUPLICATE CLASS ───────────────────────────────────────────────────────────
  function getDuplicateDay(day) {
    const map = { Monday:'Thursday', Thursday:'Monday', Tuesday:'Friday', Friday:'Tuesday', Wednesday:'Saturday', Saturday:'Wednesday' };
    return map[day] || day;
  }

  // ── ADD CLASS ENTRY ───────────────────────────────────────────────────────────
  function addClassEntry(card) {
    const tpl   = document.getElementById('class-template');
    const entry = tpl.content.firstElementChild.cloneNode(true);
    fillDaySelect(entry.querySelector('.day'));
    entry.querySelector('.start-time').value = '07:00';
    entry.querySelector('.end-time').value   = '09:00';
    entry.querySelector('.sync-mode').value  = 'sync';
    const wrap = document.createElement('div');
    wrap.className = 'class-entry-wrap';
    wrap.append(entry);
    entry.querySelector('.remove-class').addEventListener('click', () => { wrap.remove(); renderPreview(); });
    entry.querySelector('.duplicate-class').addEventListener('click', () => {
      const classesContainer = card.querySelector('.classes');
      addClassEntry(card);
      const newWrap  = classesContainer.lastElementChild;
      const newEntry = newWrap.querySelector('.class-entry');
      newEntry.querySelector('.day').value         = getDuplicateDay(entry.querySelector('.day').value);
      newEntry.querySelector('.course-code').value = entry.querySelector('.course-code').value;
      newEntry.querySelector('.room').value        = entry.querySelector('.room').value;
      newEntry.querySelector('.start-time').value  = entry.querySelector('.start-time').value;
      newEntry.querySelector('.end-time').value    = entry.querySelector('.end-time').value;
      newEntry.querySelector('.sync-mode').value   = 'async';
      renderPreview(); markUnsaved();
    });
    entry.querySelectorAll('input, select').forEach(el => el.addEventListener('input', renderPreview));
    card.querySelector('.classes').append(wrap);
  }

  // ── DUPLICATE MEMBER ─────────────────────────────────────────────────────────
  function duplicateMember(card) {
    const tpl     = document.getElementById('member-template');
    const newCard = tpl.content.firstElementChild.cloneNode(true);
    newCard.querySelector('.member-name-input').value  = '';
    newCard.querySelector('.dept-input').value         = card.querySelector('.dept-input').value;
    newCard.querySelector('.position-input').value     = '';
    const srcColor = card.querySelector('.member-color').value;
    newCard.querySelector('.member-color').value       = srcColor;
    newCard.querySelector('.member-color-hex').value   = srcColor.toUpperCase();
    wireMemberCard(newCard);
    newCard.querySelector('.classes').innerHTML = '';
    card.querySelectorAll('.class-entry').forEach(entry => {
      addClassEntry(newCard);
      const newWrap  = newCard.querySelector('.classes').lastElementChild;
      const newEntry = newWrap.querySelector('.class-entry');
      newEntry.querySelector('.day').value         = entry.querySelector('.day').value;
      newEntry.querySelector('.course-code').value = entry.querySelector('.course-code').value;
      newEntry.querySelector('.room').value        = entry.querySelector('.room').value;
      newEntry.querySelector('.start-time').value  = entry.querySelector('.start-time').value;
      newEntry.querySelector('.end-time').value    = entry.querySelector('.end-time').value;
      newEntry.querySelector('.sync-mode').value   = entry.querySelector('.sync-mode').value === 'sync' ? 'async' : entry.querySelector('.sync-mode').value;
    });
    card.after(newCard);
  }

  function wireMemberCard(card) {
    card.querySelector('.remove-member').addEventListener('click', () => {
      const name = card.querySelector('.member-name-input').value.trim() || 'this member';
      if (!confirm(`Remove ${name}? This cannot be undone.`)) return;
      card.remove(); renderPreview();
    });
    card.querySelector('.collapse-toggle').addEventListener('click', () => card.classList.toggle('collapsed'));
    card.querySelector('.duplicate-member').addEventListener('click', () => { duplicateMember(card); renderPreview(); markUnsaved(); });
    card.querySelector('.add-class-btn').addEventListener('click', () => { addClassEntry(card); renderPreview(); markUnsaved(); });

    card.querySelectorAll('.member-name-input, .dept-input, .position-input')
        .forEach(el => el.addEventListener('input', renderPreview));

    const colorPicker = card.querySelector('.member-color');
    const colorHex    = card.querySelector('.member-color-hex');

    colorPicker.addEventListener('input', () => {
      colorHex.value = colorPicker.value.toUpperCase();
      colorHex.classList.remove('hex-invalid');
      renderPreview();
      markUnsaved();
    });

    colorHex.addEventListener('input', () => {
      let val = colorHex.value.trim();
      if (val && !val.startsWith('#')) val = '#' + val;
      if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
        colorPicker.value = val;
        colorHex.value    = val.toUpperCase();
        colorHex.classList.remove('hex-invalid');
        renderPreview();
      } else {
        colorHex.classList.toggle('hex-invalid', val.length > 1);
      }
      markUnsaved();
    });

    colorHex.addEventListener('blur', () => {
      const val = colorHex.value.trim();
      if (!/^#[0-9A-Fa-f]{6}$/i.test(val)) {
        colorHex.value = colorPicker.value.toUpperCase();
        colorHex.classList.remove('hex-invalid');
      }
    });
  }

  function addMember() {
    const tpl  = document.getElementById('member-template');
    const card = tpl.content.firstElementChild.cloneNode(true);
    wireMemberCard(card);
    addClassEntry(card);
    membersEl.append(card);
  }

  // ── SAVE / LOAD ───────────────────────────────────────────────────────────────
  function exportProject() {
    const data = { learnerGroup: lgInput.value, logo: lgLogoDataUrl, logoMime: lgLogoMime, members: getData() };
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (data.learnerGroup || 'schedule') + '.txt';
    a.click();
  }

  function importProject(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const data = JSON.parse(e.target.result);
      membersEl.innerHTML = '';
      lgInput.value = data.learnerGroup || '';
      if (data.logo) { lgLogoDataUrl = data.logo; lgLogoMime = data.logoMime || 'PNG'; }
      (data.members || []).forEach(m => {
        addMember();
        const card = membersEl.lastElementChild;
        card.querySelector('.member-name-input').value = m.fullName || '';
        card.querySelector('.dept-input').value        = m.dept     || '';
        card.querySelector('.position-input').value    = m.position || '';
        const loadedColor = m.color || '#888888';
        card.querySelector('.member-color').value      = loadedColor;
        card.querySelector('.member-color-hex').value  = loadedColor.toUpperCase();
        card.querySelector('.classes').innerHTML = '';
        (m.classes || []).forEach(c => {
          addClassEntry(card);
          const wrap  = card.querySelector('.classes').lastElementChild;
          const entry = wrap.querySelector('.class-entry');
          entry.querySelector('.day').value         = c.day;
          entry.querySelector('.course-code').value = c.courseCode;
          entry.querySelector('.room').value        = c.room;
          entry.querySelector('.start-time').value  = String(Math.floor(c.start/60)).padStart(2,'0') + ':' + String(c.start%60).padStart(2,'0');
          entry.querySelector('.end-time').value    = String(Math.floor(c.end/60)).padStart(2,'0')   + ':' + String(c.end%60).padStart(2,'0');
          entry.querySelector('.sync-mode').value   = c.syncMode || 'sync';
        });
      });
      membersEl.querySelectorAll('.member-card').forEach(c => c.classList.add('collapsed'));
      renderPreview();
    };
    reader.readAsText(file);
  }

  // ── INIT ──────────────────────────────────────────────────────────────────────
  let unsavedChanges = false;
  let savedOnce      = false;
  function markUnsaved() { unsavedChanges = true; }
  function markSaved()   { unsavedChanges = false; savedOnce = true; }

  window.addEventListener('beforeunload', e => {
    if (!unsavedChanges) return;
    const msg = savedOnce
      ? 'You have unsaved changes. Save your schedule first, or your changes will be lost.'
      : 'Your schedule has not been saved. All entered data will be lost if you leave.';
    e.preventDefault(); e.returnValue = msg; return msg;
  });

  const _origExport = exportProject;
  exportProject = function() { _origExport(); markSaved(); };
  const _origImport = importProject;
  importProject = function(file) { _origImport(file); markSaved(); };

  document.getElementById('add-member').addEventListener('click', () => { addMember(); renderPreview(); markUnsaved(); });
  document.getElementById('generate-pdfs').addEventListener('click', generatePdfs);
  document.getElementById('save-project').addEventListener('click', exportProject);
  document.getElementById('load-project').addEventListener('click', () => document.getElementById('load-project-file').click());
  document.getElementById('load-project-file').addEventListener('change', e => { if(e.target.files[0]) importProject(e.target.files[0]); });
  previewDayEl.addEventListener('change', renderPreview);
  lgInput.addEventListener('input', () => { renderPreview(); markUnsaved(); });
  membersEl.addEventListener('input', markUnsaved);
  membersEl.addEventListener('click', e => { if (e.target.closest('.remove-member, .remove-class, .add-class-btn')) markUnsaved(); });

  for (let i = 0; i < 3; i++) addMember();
  renderPreview();
</script>
